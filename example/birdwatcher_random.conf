service_name = "random2_service"
function_name = "random2"
command = ["/bin/bash", "-c", "exit $((RANDOM % 2))"]
command_timeout_s = 1
interval_s = 1
fall = 1
rise = 6


[[service_definitions]]
service_name = "random3_service"
function_name = "random3"
