
[generated_file]
path = "birdwatcher_generated.conf"

[bird_reload]
command = ["/usr/bin/bash", "-c", "date >> /tmp/birdwatcher_reload.log"]
timeout_s = 2

[[service_definitions]]
service_name = "random1_service"
function_name = "random1"
command = ["/bin/bash", "-c", "exit $((RANDOM % 2))"]
command_timeout_s = 1
interval_s = 1
fall = 3
rise = 3


